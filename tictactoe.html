<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  .game {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .status {
    font-size: 1.1rem;
    margin-bottom: 20px;
    min-height: 28px;
    color: #ffd166;
  }
  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .score {
    background: rgba(255, 255, 255, 0.1);
    padding: 10px;
    border-radius: 8px;
  }
  .score .label { font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
  .score .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    aspect-ratio: 1 / 1;
    margin-bottom: 20px;
  }
  .cell {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    font-size: clamp(2.5rem, 12vw, 4rem);
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  .cell:hover:not(.taken):not(.disabled) {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.03);
  }
  .cell.taken { cursor: default; }
  .cell.disabled { cursor: not-allowed; }
  .cell.x { color: #ff6b6b; }
  .cell.o { color: #4ecdc4; }
  .cell.win {
    background: rgba(255, 209, 102, 0.3);
    border-color: #ffd166;
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  button {
    padding: 12px 24px;
    background: #ffd166;
    color: #1e3c72;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
  }
  button:hover { background: #ffcc4d; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .mode {
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .mode button {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .mode button.active { background: #ffd166; color: #1e3c72; }
</style>
</head>
<body>
  <div class="game">
    <h1>Tic Tac Toe</h1>
    <div class="mode">
      <button id="mode2p" class="active">2 Players</button>
      <button id="modeAI">vs Computer</button>
    </div>
    <div class="status" id="status">X's turn</div>
    <div class="scoreboard">
      <div class="score"><div class="label">X</div><div class="value" id="scoreX">0</div></div>
      <div class="score"><div class="label">Draws</div><div class="value" id="scoreD">0</div></div>
      <div class="score"><div class="label">O</div><div class="value" id="scoreO">0</div></div>
    </div>
    <div class="board" id="board"></div>
    <button id="resetBtn">New Game</button>
  </div>

<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('resetBtn');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');
  const scoreDEl = document.getElementById('scoreD');
  const mode2pBtn = document.getElementById('mode2p');
  const modeAIBtn = document.getElementById('modeAI');

  const LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, turn, gameOver, mode = '2p';
  const scores = { X: 0, O: 0, D: 0 };

  function reset() {
    board = Array(9).fill('');
    turn = 'X';
    gameOver = false;
    render();
    updateStatus();
  }

  function render() {
    boardEl.innerHTML = '';
    board.forEach((v, i) => {
      const c = document.createElement('div');
      c.className = 'cell' + (v ? ' taken ' + v.toLowerCase() : '') + (gameOver ? ' disabled' : '');
      c.textContent = v;
      c.dataset.index = i;
      c.addEventListener('click', () => handleClick(i));
      boardEl.appendChild(c);
    });
  }

  function highlight(line) {
    line.forEach(i => boardEl.children[i].classList.add('win'));
  }

  function checkWinner(b) {
    for (const line of LINES) {
      const [a, c, d] = line;
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line };
    }
    if (b.every(v => v)) return { winner: 'D', line: null };
    return null;
  }

  function updateStatus(result) {
    if (!result) {
      statusEl.textContent = `${turn}'s turn`;
      return;
    }
    if (result.winner === 'D') statusEl.textContent = "It's a draw!";
    else statusEl.textContent = `${result.winner} wins! 🎉`;
  }

  function handleClick(i) {
    if (gameOver || board[i]) return;
    if (mode === 'ai' && turn === 'O') return;
    move(i);
    if (!gameOver && mode === 'ai' && turn === 'O') {
      setTimeout(aiMove, 350);
    }
  }

  function move(i) {
    board[i] = turn;
    const result = checkWinner(board);
    if (result) {
      gameOver = true;
      if (result.line) highlight(result.line);
      scores[result.winner === 'D' ? 'D' : result.winner]++;
      scoreXEl.textContent = scores.X;
      scoreOEl.textContent = scores.O;
      scoreDEl.textContent = scores.D;
      render();
      updateStatus(result);
      return;
    }
    turn = turn === 'X' ? 'O' : 'X';
    render();
    updateStatus();
  }

  // Minimax for unbeatable AI
  function minimax(b, player) {
    const result = checkWinner(b);
    if (result) {
      if (result.winner === 'O') return { score: 10 };
      if (result.winner === 'X') return { score: -10 };
      return { score: 0 };
    }
    const moves = [];
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = player;
        const r = minimax(b, player === 'O' ? 'X' : 'O');
        moves.push({ index: i, score: r.score });
        b[i] = '';
      }
    }
    if (player === 'O') {
      return moves.reduce((best, m) => m.score > best.score ? m : best, { score: -Infinity });
    } else {
      return moves.reduce((best, m) => m.score < best.score ? m : best, { score: Infinity });
    }
  }

  function aiMove() {
    if (gameOver) return;
    const best = minimax([...board], 'O');
    move(best.index);
  }

  resetBtn.addEventListener('click', reset);
  mode2pBtn.addEventListener('click', () => {
    mode = '2p';
    mode2pBtn.classList.add('active');
    modeAIBtn.classList.remove('active');
    reset();
  });
  modeAIBtn.addEventListener('click', () => {
    mode = 'ai';
    modeAIBtn.classList.add('active');
    mode2pBtn.classList.remove('active');
    reset();
  });

  reset();
</script>
</body>
</html>
