<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do & Weather</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
    min-height: 100vh;
    padding: 20px;
    color: #2d3436;
  }
  .container {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 720px) {
    .container { grid-template-columns: 1fr; }
  }
  h1 {
    grid-column: 1 / -1;
    color: #fff;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  .card h2 {
    margin-bottom: 16px;
    color: #2d3436;
    font-size: 1.3rem;
  }

  /* Todo styles */
  .todo-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .todo-input-row input {
    flex: 1;
    padding: 10px 12px;
    border: 2px solid #dfe6e9;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .todo-input-row input:focus { border-color: #74b9ff; }
  button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #6c5ce7;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #5a4fcf; }
  button:active { transform: scale(0.97); }
  #todoList { list-style: none; }
  #todoList li {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #f1f2f6;
    gap: 10px;
  }
  #todoList li:last-child { border-bottom: none; }
  #todoList input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #6c5ce7;
  }
  #todoList .task-text {
    flex: 1;
    font-size: 15px;
    word-break: break-word;
  }
  #todoList li.done .task-text {
    text-decoration: line-through;
    color: #b2bec3;
  }
  .delete-btn {
    background: transparent;
    color: #d63031;
    padding: 4px 8px;
    font-size: 18px;
    line-height: 1;
  }
  .delete-btn:hover { background: #ffe5e5; }
  .empty {
    text-align: center;
    color: #b2bec3;
    padding: 20px 0;
    font-style: italic;
  }

  /* Weather styles */
  .weather-search {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .weather-search input {
    flex: 1;
    padding: 10px 12px;
    border: 2px solid #dfe6e9;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .weather-search input:focus { border-color: #74b9ff; }
  .weather-display {
    text-align: center;
    padding: 10px 0;
  }
  .weather-icon { font-size: 64px; margin: 10px 0; }
  .weather-temp { font-size: 48px; font-weight: 300; color: #2d3436; }
  .weather-location { font-size: 18px; color: #636e72; margin: 6px 0; }
  .weather-desc { color: #636e72; margin-bottom: 12px; }
  .weather-details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #f1f2f6;
  }
  .weather-detail {
    text-align: center;
    font-size: 13px;
  }
  .weather-detail .label { color: #b2bec3; display: block; margin-bottom: 4px; }
  .weather-detail .value { font-weight: 600; color: #2d3436; }
  .status { text-align: center; color: #636e72; padding: 20px 0; }
  .error { color: #d63031; }
</style>
</head>
<body>
  <div class="container">
    <h1>My Day</h1>

    <section class="card">
      <h2>To-Do List</h2>
      <form class="todo-input-row" id="todoForm">
        <input type="text" id="todoInput" placeholder="Add a task..." maxlength="200" required />
        <button type="submit">Add</button>
      </form>
      <ul id="todoList"></ul>
    </section>

    <section class="card">
      <h2>Weather</h2>
      <form class="weather-search" id="weatherForm">
        <input type="text" id="cityInput" placeholder="Enter a city..." required />
        <button type="submit">Search</button>
      </form>
      <div id="weatherDisplay" class="weather-display">
        <div class="status">Search for a city or use your location.</div>
        <button type="button" id="geoBtn">Use my location</button>
      </div>
    </section>
  </div>

<script>
  // ---------- To-Do ----------
  const STORAGE_KEY = 'todo_weather_tasks';
  const todoForm = document.getElementById('todoForm');
  const todoInput = document.getElementById('todoInput');
  const todoList = document.getElementById('todoList');

  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function renderTasks() {
    todoList.innerHTML = '';
    if (tasks.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty';
      empty.textContent = 'No tasks yet. Add one above!';
      todoList.appendChild(empty);
      return;
    }
    tasks.forEach((task, idx) => {
      const li = document.createElement('li');
      if (task.done) li.classList.add('done');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = task.done;
      checkbox.addEventListener('change', () => {
        tasks[idx].done = checkbox.checked;
        saveTasks();
        renderTasks();
      });

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = task.text;

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '×';
      del.title = 'Delete task';
      del.addEventListener('click', () => {
        tasks.splice(idx, 1);
        saveTasks();
        renderTasks();
      });

      li.append(checkbox, span, del);
      todoList.appendChild(li);
    });
  }

  todoForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = todoInput.value.trim();
    if (!text) return;
    tasks.push({ text, done: false });
    saveTasks();
    todoInput.value = '';
    renderTasks();
  });

  renderTasks();

  // ---------- Weather ----------
  const weatherForm = document.getElementById('weatherForm');
  const cityInput = document.getElementById('cityInput');
  const weatherDisplay = document.getElementById('weatherDisplay');
  const geoBtn = document.getElementById('geoBtn');

  const WEATHER_CODES = {
    0:  { icon: '☀️',  desc: 'Clear sky' },
    1:  { icon: '🌤️', desc: 'Mainly clear' },
    2:  { icon: '⛅',  desc: 'Partly cloudy' },
    3:  { icon: '☁️',  desc: 'Overcast' },
    45: { icon: '🌫️', desc: 'Fog' },
    48: { icon: '🌫️', desc: 'Rime fog' },
    51: { icon: '🌦️', desc: 'Light drizzle' },
    53: { icon: '🌦️', desc: 'Drizzle' },
    55: { icon: '🌦️', desc: 'Dense drizzle' },
    61: { icon: '🌧️', desc: 'Light rain' },
    63: { icon: '🌧️', desc: 'Rain' },
    65: { icon: '🌧️', desc: 'Heavy rain' },
    71: { icon: '🌨️', desc: 'Light snow' },
    73: { icon: '🌨️', desc: 'Snow' },
    75: { icon: '🌨️', desc: 'Heavy snow' },
    77: { icon: '🌨️', desc: 'Snow grains' },
    80: { icon: '🌦️', desc: 'Rain showers' },
    81: { icon: '🌧️', desc: 'Rain showers' },
    82: { icon: '⛈️',  desc: 'Violent rain showers' },
    85: { icon: '🌨️', desc: 'Snow showers' },
    86: { icon: '🌨️', desc: 'Heavy snow showers' },
    95: { icon: '⛈️',  desc: 'Thunderstorm' },
    96: { icon: '⛈️',  desc: 'Thunderstorm w/ hail' },
    99: { icon: '⛈️',  desc: 'Severe thunderstorm' }
  };

  function showStatus(msg, isError = false) {
    weatherDisplay.innerHTML = `<div class="status ${isError ? 'error' : ''}">${msg}</div>`;
  }

  function renderWeather(data, locationName) {
    const code = data.weather_code;
    const info = WEATHER_CODES[code] || { icon: '🌡️', desc: 'Unknown' };
    weatherDisplay.innerHTML = `
      <div class="weather-icon">${info.icon}</div>
      <div class="weather-temp">${Math.round(data.temperature_2m)}°C</div>
      <div class="weather-location">${locationName}</div>
      <div class="weather-desc">${info.desc}</div>
      <div class="weather-details">
        <div class="weather-detail">
          <span class="label">Feels like</span>
          <span class="value">${Math.round(data.apparent_temperature)}°C</span>
        </div>
        <div class="weather-detail">
          <span class="label">Humidity</span>
          <span class="value">${data.relative_humidity_2m}%</span>
        </div>
        <div class="weather-detail">
          <span class="label">Wind</span>
          <span class="value">${Math.round(data.wind_speed_10m)} km/h</span>
        </div>
      </div>
    `;
  }

  async function fetchWeather(lat, lon, label) {
    showStatus('Loading weather...');
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                  `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Weather request failed');
      const json = await res.json();
      renderWeather(json.current, label);
    } catch (err) {
      showStatus('Could not load weather. Please try again.', true);
    }
  }

  async function geocodeCity(city) {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Geocoding failed');
    const json = await res.json();
    if (!json.results || json.results.length === 0) return null;
    const r = json.results[0];
    return {
      lat: r.latitude,
      lon: r.longitude,
      label: [r.name, r.admin1, r.country].filter(Boolean).join(', ')
    };
  }

  weatherForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const city = cityInput.value.trim();
    if (!city) return;
    showStatus('Finding location...');
    try {
      const loc = await geocodeCity(city);
      if (!loc) {
        showStatus(`Couldn't find "${city}". Try another name.`, true);
        return;
      }
      await fetchWeather(loc.lat, loc.lon, loc.label);
    } catch (err) {
      showStatus('Search failed. Please try again.', true);
    }
  });

  geoBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
      showStatus('Geolocation not supported by your browser.', true);
      return;
    }
    showStatus('Getting your location...');
    navigator.geolocation.getCurrentPosition(
      (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude, 'Your location'),
      () => showStatus('Location permission denied.', true)
    );
  });
</script>
</body>
</html>
