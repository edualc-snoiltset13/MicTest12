<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hello</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            padding: 3rem 4rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }
        h1 { margin: 0 0 0.5rem; font-size: 2.5rem; }
        p { margin: 0 0 1.5rem; opacity: 0.85; }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #fff;
            color: #5a67d8;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #f3f4f6; }
        #msg { margin-top: 1rem; min-height: 1.5rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello!</h1>
        <p>A simple HTML page you can open in any browser.</p>
        <button onclick="document.getElementById('msg').textContent = 'It works! ' + new Date().toLocaleTimeString()">
            Click me
        </button>
        <div id="msg"></div>
    </div>
</body>
</html>
